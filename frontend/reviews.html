<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户评价 - API Relay Monitor</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    body { background: #0f172a; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(148, 163, 184, 0.1); }
    .badge-positive { background: #065f46; color: #6ee7b7; }
    .badge-negative { background: #7f1d1d; color: #fca5a5; }
    .badge-neutral  { background: #1e3a5f; color: #93c5fd; }
    .badge-mixed   { background: #713f12; color: #fde047; }
    .platform-badge { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; }
    .sentiment-bar { height: 6px; border-radius: 3px; transition: width 0.5s; }
    .review-card:hover { border-color: rgba(99, 102, 241, 0.4); }
    .tag { display: inline-block; background: rgba(99, 102, 241, 0.15); color: #a5b4fc; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; margin: 2px; }
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="min-h-screen">

<div id="app" class="max-w-7xl mx-auto px-4 py-6">
  <!-- 顶栏 -->
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold">📊 用户评价分析</h1>
      <p class="text-gray-400 text-sm mt-1">来自 linux.do、V2EX、X 等社区的真实评价</p>
    </div>
    <div class="flex gap-2">
      <button onclick="loadReviews()" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 rounded-lg text-sm font-medium">刷新</button>
      <button onclick="runAnalysis()" class="px-4 py-2 bg-purple-600 hover:bg-purple-700 rounded-lg text-sm font-medium">🤖 LLM 分析</button>
      <a href="/" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-sm font-medium">← 返回首页</a>
    </div>
  </div>

  <!-- 筛选栏 -->
  <div class="glass rounded-xl p-4 mb-4 flex flex-wrap gap-3 items-center">
    <select id="filterSite" onchange="loadReviews()" class="bg-gray-800 border border-gray-600 rounded-lg px-3 py-2 text-sm">
      <option value="">全部站点</option>
    </select>
    <select id="filterPlatform" onchange="loadReviews()" class="bg-gray-800 border border-gray-600 rounded-lg px-3 py-2 text-sm">
      <option value="">全部平台</option>
      <option value="linux_do">linux.do</option>
      <option value="v2ex">V2EX</option>
      <option value="x">X / Twitter</option>
      <option value="telegram">Telegram</option>
      <option value="reddit">Reddit</option>
    </select>
    <select id="filterSentiment" onchange="loadReviews()" class="bg-gray-800 border border-gray-600 rounded-lg px-3 py-2 text-sm">
      <option value="">全部情感</option>
      <option value="positive">👍 正面</option>
      <option value="negative">👎 负面</option>
      <option value="neutral">😐 中性</option>
      <option value="mixed">🤔 混合</option>
    </select>
    <input id="filterKeyword" type="text" placeholder="搜索关键词..." class="bg-gray-800 border border-gray-600 rounded-lg px-3 py-2 text-sm flex-1 min-w-48" onkeydown="if(event.key==='Enter')loadReviews()">
    <select id="sortBy" onchange="loadReviews()" class="bg-gray-800 border border-gray-600 rounded-lg px-3 py-2 text-sm">
      <option value="posted_at">按时间</option>
      <option value="likes">按点赞</option>
      <option value="rating">按评分</option>
    </select>
  </div>

  <!-- 统计卡片 -->
  <div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-4" id="statsCards"></div>

  <!-- 情感分布条 -->
  <div class="glass rounded-xl p-4 mb-4" id="sentimentBar">
    <div class="flex gap-1 h-3 rounded-full overflow-hidden bg-gray-800">
      <div id="bar-positive" class="sentiment-bar bg-emerald-500" style="width:0"></div>
      <div id="bar-neutral" class="sentiment-bar bg-blue-400" style="width:0"></div>
      <div id="bar-mixed" class="sentiment-bar bg-yellow-400" style="width:0"></div>
      <div id="bar-negative" class="sentiment-bar bg-red-500" style="width:0"></div>
    </div>
    <div class="flex justify-between mt-2 text-xs text-gray-400">
      <span id="label-positive">正面 0</span>
      <span id="label-neutral">中性 0</span>
      <span id="label-mixed">混合 0</span>
      <span id="label-negative">负面 0</span>
    </div>
  </div>

  <!-- 主体：左侧列表 + 右侧分析 -->
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
    <!-- 评价列表 -->
    <div class="lg:col-span-2">
      <div id="reviewList" class="space-y-3"></div>
      <div id="pagination" class="flex justify-center gap-2 mt-4"></div>
    </div>

    <!-- 右侧面板 -->
    <div class="space-y-4">
      <!-- 站点选择（下钻） -->
      <div class="glass rounded-xl p-4">
        <h3 class="text-sm font-semibold text-gray-300 mb-3">🔍 站点评价下钻</h3>
        <select id="drilldownSite" onchange="loadDrilldown()" class="w-full bg-gray-800 border border-gray-600 rounded-lg px-3 py-2 text-sm mb-3">
          <option value="">选择站点查看详情...</option>
        </select>
        <div id="drilldownStats"></div>
      </div>

      <!-- LLM 分析结果 -->
      <div class="glass rounded-xl p-4" id="analysisPanel" style="display:none">
        <h3 class="text-sm font-semibold text-gray-300 mb-3">🤖 LLM 分析结果</h3>
        <div id="analysisContent"></div>
      </div>

      <!-- 平台分布 -->
      <div class="glass rounded-xl p-4">
        <h3 class="text-sm font-semibold text-gray-300 mb-3">📱 平台分布</h3>
        <div id="platformDist"></div>
      </div>

      <!-- 热门标签 -->
      <div class="glass rounded-xl p-4">
        <h3 class="text-sm font-semibold text-gray-300 mb-3">🏷️ 热门关键词</h3>
        <div id="topTags" class="flex flex-wrap"></div>
      </div>
    </div>
  </div>
</div>

<script>
const API = '';

async function api(url) {
  const r = await fetch(url);
  return r.json();
}

// 初始化
async function init() {
  const sites = await api(`${API}/api/sites?page_size=100`);
  const items = sites.items || [];
  const opts = items.map(s => `<option value="${s.id}">${s.name} (${s.relay_type || ''})</option>`).join('');
  document.getElementById('filterSite').innerHTML = '<option value="">全部站点</option>' + opts;
  document.getElementById('drilldownSite').innerHTML = '<option value="">选择站点查看详情...</option>' + opts;
  loadReviews();
  loadStats();
}

// 加载评价列表
async function loadReviews(page = 1) {
  const params = new URLSearchParams({ page, page_size: 20 });
  const site = document.getElementById('filterSite').value;
  const platform = document.getElementById('filterPlatform').value;
  const sentiment = document.getElementById('filterSentiment').value;
  const keyword = document.getElementById('filterKeyword').value;
  const sort = document.getElementById('sortBy').value;
  if (site) params.set('site_id', site);
  if (platform) params.set('platform', platform);
  if (sentiment) params.set('sentiment', sentiment);
  if (keyword) params.set('keyword', keyword);
  params.set('sort_by', sort);

  const data = await api(`${API}/api/reviews?${params}`);
  renderReviews(data.items || []);
  renderPagination(data);
}

// 渲染评价列表
function renderReviews(reviews) {
  const el = document.getElementById('reviewList');
  if (!reviews.length) {
    el.innerHTML = '<div class="glass rounded-xl p-8 text-center text-gray-400">暂无评价数据<br><button onclick="seedReviews()" class="mt-3 px-4 py-2 bg-indigo-600 rounded-lg text-sm">📥 导入种子评价</button></div>';
    return;
  }
  el.innerHTML = reviews.map(r => `
    <div class="review-card glass rounded-xl p-4 fade-in border border-transparent hover:border-indigo-500/30 transition-colors">
      <div class="flex items-start justify-between mb-2">
        <div class="flex items-center gap-2 flex-wrap">
          <span class="platform-badge bg-gray-700 text-gray-300">${platformIcon(r.platform)} ${r.platform}</span>
          <span class="platform-badge badge-${r.sentiment}">${sentimentLabel(r.sentiment)}</span>
          ${r.author ? `<span class="text-xs text-gray-400">@${r.author}</span>` : ''}
          ${r.rating ? `<span class="text-xs text-yellow-400">★ ${r.rating.toFixed(1)}</span>` : ''}
        </div>
        <div class="flex items-center gap-3 text-xs text-gray-500">
          ${r.likes ? `<span>👍 ${r.likes}</span>` : ''}
          ${r.replies ? `<span>💬 ${r.replies}</span>` : ''}
          ${r.posted_at ? `<span>${new Date(r.posted_at).toLocaleDateString()}</span>` : ''}
        </div>
      </div>
      <p class="text-sm text-gray-200 leading-relaxed">${escapeHtml(r.content)}</p>
      ${r.llm_summary ? `<div class="mt-2 p-2 bg-purple-900/20 rounded text-xs text-purple-300">🤖 ${escapeHtml(r.llm_summary)}</div>` : ''}
      ${r.llm_tags?.length ? `<div class="mt-2">${r.llm_tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>` : ''}
      ${r.source_url ? `<a href="${r.source_url}" target="_blank" class="text-xs text-indigo-400 hover:underline mt-2 inline-block">查看原文 →</a>` : ''}
    </div>
  `).join('');
}

// 渲染分页
function renderPagination(data) {
  const el = document.getElementById('pagination');
  if (!data.total_pages || data.total_pages <= 1) { el.innerHTML = ''; return; }
  let html = '';
  for (let i = 1; i <= data.total_pages && i <= 10; i++) {
    html += `<button onclick="loadReviews(${i})" class="px-3 py-1 rounded ${i === data.page ? 'bg-indigo-600' : 'bg-gray-700 hover:bg-gray-600'} text-sm">${i}</button>`;
  }
  el.innerHTML = html;
}

// 加载统计
async function loadStats() {
  const data = await api(`${API}/api/reviews/stats`);
  const total = data.total_reviews || 0;
  const sent = data.sentiment_distribution || {};
  const avg = data.avg_rating;

  document.getElementById('statsCards').innerHTML = `
    <div class="glass rounded-xl p-3 text-center"><div class="text-2xl font-bold">${total}</div><div class="text-xs text-gray-400">总评价</div></div>
    <div class="glass rounded-xl p-3 text-center"><div class="text-2xl font-bold text-emerald-400">${sent.positive || 0}</div><div class="text-xs text-gray-400">正面</div></div>
    <div class="glass rounded-xl p-3 text-center"><div class="text-2xl font-bold text-red-400">${sent.negative || 0}</div><div class="text-xs text-gray-400">负面</div></div>
    <div class="glass rounded-xl p-3 text-center"><div class="text-2xl font-bold text-yellow-400">${avg ? avg.toFixed(1) : 'N/A'}</div><div class="text-xs text-gray-400">平均分</div></div>
    <div class="glass rounded-xl p-3 text-center"><div class="text-2xl font-bold text-blue-400">${Object.keys(data.platform_distribution || {}).length}</div><div class="text-xs text-gray-400">来源平台</div></div>
  `;

  // 情感分布条
  const pct = k => total ? ((sent[k] || 0) / total * 100).toFixed(1) : 0;
  ['positive','neutral','mixed','negative'].forEach(k => {
    document.getElementById(`bar-${k}`).style.width = pct(k) + '%';
    document.getElementById(`label-${k}`).textContent = `${sentimentLabel(k)} ${sent[k] || 0}`;
  });

  // 平台分布
  const pd = data.platform_distribution || {};
  document.getElementById('platformDist').innerHTML = Object.entries(pd).map(([p, c]) =>
    `<div class="flex justify-between py-1"><span class="text-sm">${platformIcon(p)} ${p}</span><span class="text-sm text-gray-400">${c}</span></div>`
  ).join('') || '<div class="text-gray-500 text-sm">暂无数据</div>';
}

// 站点下钻
async function loadDrilldown() {
  const siteId = document.getElementById('drilldownSite').value;
  if (!siteId) { document.getElementById('drilldownStats').innerHTML = ''; return; }
  const data = await api(`${API}/api/reviews/site/${siteId}/drilldown`);
  const s = data.stats || {};
  document.getElementById('drilldownStats').innerHTML = `
    <div class="space-y-2 text-sm">
      <div class="font-semibold">${data.site?.name || ''} <span class="text-xs text-gray-400">(${data.site?.risk_level || ''})</span></div>
      <div class="flex justify-between"><span class="text-gray-400">总评价</span><span>${s.total_reviews || 0}</span></div>
      <div class="flex justify-between"><span class="text-gray-400">平均分</span><span>${s.avg_rating || 'N/A'}</span></div>
      <div class="flex gap-2 text-xs">
        ${(s.sentiment_distribution ? Object.entries(s.sentiment_distribution) : []).map(([k,v]) =>
          `<span class="badge-${k} px-2 py-0.5 rounded">${sentimentLabel(k)} ${v}</span>`
        ).join('')}
      </div>
      <div class="text-xs text-gray-500 mt-1">平台: ${Object.entries(s.platform_distribution || {}).map(([p,c]) => `${p}(${c})`).join(', ')}</div>
    </div>
  `;
}

// LLM 分析
async function runAnalysis() {
  const siteId = document.getElementById('filterSite').value;
  const platform = document.getElementById('filterPlatform').value;
  const panel = document.getElementById('analysisPanel');
  const content = document.getElementById('analysisContent');

  panel.style.display = 'block';
  content.innerHTML = '<div class="text-center text-gray-400 py-4">⏳ LLM 分析中...</div>';

  const body = { limit: 50 };
  if (siteId) body.site_id = parseInt(siteId);
  if (platform) body.platform = platform;

  try {
    const r = await fetch(`${API}/api/reviews/analyze`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await r.json();
    renderAnalysis(data);
  } catch (e) {
    content.innerHTML = `<div class="text-red-400 text-sm">分析失败: ${e.message}</div>`;
  }
}

function renderAnalysis(data) {
  const el = document.getElementById('analysisContent');
  el.innerHTML = `
    <div class="space-y-3">
      ${data.site_name ? `<div class="text-sm font-semibold">${data.site_name}</div>` : ''}
      <div class="flex gap-3 text-xs">
        <span class="text-gray-400">共 ${data.total_reviews} 条评价</span>
        <span class="text-yellow-400">均分 ${data.avg_rating || 'N/A'}</span>
      </div>
      ${data.llm_summary ? `<div class="p-3 bg-purple-900/20 rounded-lg text-sm text-purple-200">${escapeHtml(data.llm_summary)}</div>` : '<div class="text-gray-500 text-sm">LLM 不可用，显示基础统计</div>'}
      ${data.highlights?.length ? `
        <div><div class="text-xs text-gray-400 mb-1">👍 代表性正面评价</div>
        ${data.highlights.map(h => `<div class="text-xs bg-emerald-900/20 p-2 rounded mb-1">${escapeHtml(h.content)} <span class="text-gray-500">(${h.platform}, 👍${h.likes})</span></div>`).join('')}</div>
      ` : ''}
      ${data.risks?.length ? `
        <div><div class="text-xs text-gray-400 mb-1">⚠️ 风险评价</div>
        ${data.risks.map(r => `<div class="text-xs bg-red-900/20 p-2 rounded mb-1">${escapeHtml(r.content)} <span class="text-gray-500">(${r.platform})</span></div>`).join('')}</div>
      ` : ''}
      ${data.top_keywords?.length ? `<div class="flex flex-wrap">${data.top_keywords.map(t => `<span class="tag">${t}</span>`).join('')}</div>` : ''}
    </div>
  `;
  // 同时更新热门标签
  document.getElementById('topTags').innerHTML = (data.top_keywords || []).map(t => `<span class="tag">${t}</span>`).join('') || '<span class="text-gray-500 text-sm">运行 LLM 分析后显示</span>';
}

// 导入种子评价
async function seedReviews() {
  const seeds = [
    { relay_site_id: 7, platform: "linux_do", sentiment: "positive", content: "模型又多又稳定，就是价格不美丽……只能说是最稳的渠道了", likes: 45 },
    { relay_site_id: 7, platform: "linux_do", sentiment: "negative", content: "风控国内支付渠道，大陆/香港信用卡充值就会触发封禁", likes: 23 },
    { relay_site_id: 2, platform: "linux_do", sentiment: "positive", content: "模型挺全的，注册即送2000万Tokens", likes: 38 },
    { relay_site_id: 2, platform: "linux_do", sentiment: "negative", content: "高峰期不到10 tokens/s，经常超时", likes: 31 },
    { relay_site_id: 2, platform: "x", sentiment: "mixed", content: "以前接近80 tokens/s，现在用的人太多降速了", likes: 12 },
    { relay_site_id: 3, platform: "linux_do", sentiment: "negative", content: "o1全是不思考的，降智有点离谱", likes: 67 },
    { relay_site_id: 3, platform: "linux_do", sentiment: "negative", content: "判断是否是中国作息来封禁账号，API里还有余额", likes: 55 },
    { relay_site_id: 3, platform: "linux_do", sentiment: "positive", content: "很稳定，能开票，企业级", likes: 15 },
    { relay_site_id: 1, platform: "v2ex", sentiment: "positive", content: "比市面上中转站的价格都低而且支持高并发", likes: 28 },
    { relay_site_id: 1, platform: "v2ex", sentiment: "negative", content: "响应速度慢，调用Claude/Gemini非常慢", likes: 19 },
    { relay_site_id: 6, platform: "v2ex", sentiment: "negative", content: "21块钱做了几次嵌入就没了？计费太狠", likes: 42 },
    { relay_site_id: 6, platform: "v2ex", sentiment: "positive", content: "老牌站，国内可用", likes: 8 },
  ];

  let created = 0;
  for (const s of seeds) {
    try {
      const r = await fetch(`${API}/api/reviews`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(s),
      });
      if (r.ok) created++;
    } catch (e) {}
  }
  alert(`成功导入 ${created} 条种子评价`);
  loadReviews();
  loadStats();
}

function platformIcon(p) {
  return { linux_do: '🦭', v2ex: '🔷', x: '🐦', telegram: '✈️', reddit: '🟠' }[p] || '🌐';
}
function sentimentLabel(s) {
  return { positive: '👍 正面', negative: '👎 负面', neutral: '😐 中性', mixed: '🤔 混合' }[s] || s;
}
function escapeHtml(t) {
  if (!t) return '';
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
