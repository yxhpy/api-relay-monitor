<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>API 中转站智能监控</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus@2.6.1/dist/index.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div id="app">
    <!-- Global loading -->
    <div v-if="initializing" class="global-loading">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="10" stroke="#409EFF" stroke-width="3" stroke-dasharray="31.4 31.4" stroke-linecap="round">
          <animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="1s" repeatCount="indefinite"/>
        </circle>
      </svg>
      <span>系统加载中...</span>
    </div>

    <div v-else class="app-container">
      <!-- Sidebar -->
      <div class="sidebar" :class="{ collapsed: sidebarCollapsed }">
        <div class="sidebar-logo">
          <svg viewBox="0 0 24 24" fill="none">
            <rect x="2" y="2" width="20" height="20" rx="4" fill="#409EFF"/>
            <path d="M7 12h10M12 7v10" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
            <circle cx="12" cy="12" r="3" stroke="#fff" stroke-width="1.5" fill="none"/>
          </svg>
          <span>API 监控</span>
        </div>
        <div class="sidebar-nav">
          <div v-for="item in navItems" :key="item.key"
               class="sidebar-item" :class="{ active: currentPage === item.key }"
               @click="navigateTo(item.key)">
            <el-icon><component :is="item.icon" /></el-icon>
            <span class="sidebar-label">{{ item.label }}</span>
          </div>
        </div>
        <div style="padding: 12px 8px; border-top: 1px solid rgba(255,255,255,0.06);">
          <div class="sidebar-item" @click="sidebarCollapsed = !sidebarCollapsed">
            <el-icon><component :is="sidebarCollapsed ? 'Expand' : 'Fold'" /></el-icon>
            <span class="sidebar-label">{{ sidebarCollapsed ? '展开' : '收起' }}</span>
          </div>
        </div>
      </div>

      <!-- Main Area -->
      <div class="main-area">
        <!-- Header -->
        <div class="header-bar">
          <div class="header-left">
            <el-icon style="font-size:18px;cursor:pointer" @click="sidebarCollapsed = !sidebarCollapsed"><component :is="sidebarCollapsed ? 'Expand' : 'Fold'" /></el-icon>
            <span class="header-title">{{ currentNavLabel }}</span>
          </div>
          <div class="header-right">
            <el-tooltip content="刷新数据" placement="bottom">
              <el-button :icon="Refresh" circle size="small" @click="refreshCurrentPage" />
            </el-tooltip>
            <el-badge :value="unreadAlerts" :hidden="unreadAlerts === 0" :max="99">
              <el-button :icon="Bell" circle size="small" @click="navigateTo('analysis')" />
            </el-badge>
            <el-button :icon="Setting" circle size="small" @click="navigateTo('settings')" />
          </div>
        </div>

        <!-- Content -->
        <div class="content-area">
          <transition name="fade" mode="out-in">
            <div id="templates-inject-point">
            </div>
          </transition>
        </div>
      </div>
    </div>
  </div>

  <!-- 第三方库 CDN -->
  <script src="https://unpkg.com/vue@3.4.21/dist/vue.global.js"></script>
  <script src="https://unpkg.com/element-plus@2.6.1"></script>
  <script src="https://unpkg.com/@element-plus/icons-vue"></script>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.0.0/dist/markdown-it.min.js"></script>

  <!-- 应用模块（按依赖顺序加载） -->
  <script src="/static/js/api.js"></script>
  <script src="/static/js/formatters.js"></script>
  <script src="/static/js/use-dashboard.js"></script>
  <script src="/static/js/use-sites.js"></script>
  <script src="/static/js/use-crawl.js"></script>
  <script src="/static/js/use-analysis.js"></script>
  <script src="/static/js/use-settings.js"></script>
  <script src="/static/js/use-reviews.js"></script>
  <script src="/static/js/templates.js"></script>
  <script>
    // 先加载模板，再初始化 Vue app
    loadTemplates().then(function() {
      var appScript = document.createElement('script');
      appScript.src = '/static/js/app.js';
      document.body.appendChild(appScript);
    });
  </script>
</body>
</html>
