<!-- ========== Settings ========== -->
<div v-if="currentPage === 'settings'" key="settings">
  <div style="max-width:700px;">
    <!-- LLM Config -->
    <div class="section-card">
      <div class="section-title"><span><el-icon><Cpu /></el-icon> LLM 配置</span></div>
      <el-form label-width="120px" label-position="top">
        <el-form-item label="API Key">
          <el-input v-model="settings.llm_api_key" type="password" show-password placeholder="sk-xxx..." />
        </el-form-item>
        <el-form-item label="API Base URL">
          <el-input v-model="settings.llm_api_base" placeholder="https://api.openai.com/v1" />
        </el-form-item>
        <el-form-item label="模型名称">
          <el-input v-model="settings.llm_model" placeholder="gpt-4o-mini" />
        </el-form-item>
      </el-form>
    </div>

    <!-- Telegram Config -->
    <div class="section-card">
      <div class="section-title"><span><el-icon><ChatDotRound /></el-icon> Telegram 通知</span></div>
      <el-form label-width="120px" label-position="top">
        <el-form-item label="Bot Token">
          <el-input v-model="settings.telegram_bot_token" type="password" show-password placeholder="123456:ABC-DEF..." />
        </el-form-item>
        <el-form-item label="Chat ID">
          <el-input v-model="settings.telegram_chat_id" placeholder="-1001234567890" />
        </el-form-item>
      </el-form>
    </div>

    <!-- Crawl Config -->
    <div class="section-card">
      <div class="section-title"><span><el-icon><Timer /></el-icon> 采集设置</span></div>
      <el-form label-width="120px" label-position="top">
        <el-form-item label="采集间隔 (分钟)">
          <el-input-number v-model="settings.crawl_interval" :min="5" :max="1440" :step="5" />
        </el-form-item>
        <el-form-item label="启用来源">
          <el-checkbox-group v-model="settings.enabled_sources">
            <el-checkbox label="linux_do">linux.do</el-checkbox>
            <el-checkbox label="v2ex">V2EX</el-checkbox>
            <el-checkbox label="github">GitHub</el-checkbox>
            <el-checkbox label="rss">RSS</el-checkbox>
          </el-checkbox-group>
        </el-form-item>
      </el-form>
    </div>

    <div style="display:flex;justify-content:flex-end;gap:12px;">
      <el-button @click="loadSettings">重置</el-button>
      <el-button type="primary" @click="saveSettings" :loading="loading.settings">
        <el-icon><Check /></el-icon> 保存设置
      </el-button>
    </div>
  </div>
</div>
